name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package plugin
        run: |
          mkdir -p gdrive.koplugin
          cp _meta.lua main.lua annotations.lua gdrive_sync.lua network.lua progress.lua utils.lua gdrive.koplugin/
          zip -r gdrive.koplugin.zip gdrive.koplugin/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: gdrive.koplugin.zip
          generate_release_notes: true
